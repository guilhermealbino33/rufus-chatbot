[phases.setup]
nixPkgs = ["nodejs_20"]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
CHROMIUM_EXECUTABLE_PATH = "/usr/bin/chromium"

# Bibliotecas essenciais para o Chromium/Puppeteer rodar em Debian/Ubuntu (usado pelo WPPConnect)
  "chromium",
  "libglib2.0-0",
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libgbm1",
  "libasound2",
  "libgtk-3-0",
  "libxcomposite1",
  "libpangocairo-1.0-0",
  "libxrender1",
  "libxss1",
  "libxtst6"
]

[phases.build]
cmds = ["npm ci", "npm run build --workspace=rufus-chatbot-api"]

[start]
cmd = "npm run start:prod --workspace=rufus-chatbot-api"
