version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://user:password@db:5432/dbname
      - CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      # Aponta para o volume persistido dentro do container
      - WPPCONNECT_TOKENS_DIR=/usr/src/app/wpp-sessions
    depends_on:
      - db
    # CRÍTICO: Chromium precisa de pelo menos 256 MB de memória compartilhada.
    # Sem isso, o processo trava silenciosamente com ENOMEM no /dev/shm.
    shm_size: '256mb'
    # Permite que o Chromium crie namespaces sem root (necessário sem --no-sandbox em alguns kernels)
    cap_add:
      - SYS_ADMIN
    volumes:
      # Volume persistente para tokens de sessão do WPPConnect.
      # SEM isso, toda reinicialização do container perde as sessões autenticadas!
      - wpp_sessions:/usr/src/app/wpp-sessions

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
  # Volume nomeado para persistir os tokens WPPConnect entre reinicializações
  wpp_sessions:
